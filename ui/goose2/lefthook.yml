pre-commit:
  commands:
    format:
      run: biome format --write . && biome check --fix . && git add -u
    check:
      run: just check

pre-push:
  parallel: true
  commands:
    fmt-check:
      run: just fmt-check
    clippy:
      run: just clippy
    check:
      run: just check
    test:
      run: just test
    build:
      run: just build
    tauri-check:
      run: just tauri-check
